<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jonathan Jo - Software Engineer specializing in Java, Spring Boot, Go, React, and AWS. Portfolio showcasing enterprise and personal projects." />
    <meta name="author" content="Jonathan Jo" />
    <meta property="og:title" content="Jonathan Jo | Software Engineer" />
    <meta property="og:description" content="Software Engineer creating impactful, cloud-driven experiences through Java, Spring Boot, Go, React, and AWS." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/img/3usbudo3.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Jonathan Jo | Software Engineer</title>
    <link rel="icon" href="assets/img/favicon.ico" type="image/x-icon" />
    <link href="css/styles.css?v=2" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
  </head>
  <body id="page-top">
    <div id="hero-placeholder"></div>
    <div id="nav-placeholder"></div>
    <div id="nav-overlay" class="nav-overlay"></div>
    <div id="about"></div>
    <div id="projects"></div>
    <div id="technologies"></div>
    <div id="portfolio"></div>
    <div id="contact"></div>
    <!-- Bootstrap core JS-->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Third party plugin JS-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/jquery.magnific-popup.min.js"></script>
    <!-- Core theme JS-->
    <script src="js/scripts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      mermaid.initialize({
        startOnLoad: false,
        theme: 'dark',
        themeVariables: {
          darkMode: true,
          background: '#0f172a',
          primaryColor: '#1e3a5f',
          primaryTextColor: '#e5e9f0',
          primaryBorderColor: '#5b8cff',
          lineColor: '#5b8cff',
          secondaryColor: '#1a2240',
          tertiaryColor: '#12192f',
          fontFamily: '"Merriweather Sans", system-ui, sans-serif',
          fontSize: '12px',
        },
      });
      window.renderMermaid = function() {
        mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
      };
    </script>
    <script>
      $(function () {
        $(".portfolio-grid").magnificPopup({
          delegate: "a.portfolio-box", // child items
          type: "image",
          gallery: { enabled: true }, // arrows + keyboard nav
          image: {
            titleSrc: function (item) {
              // Use data-title if present; else fall back to the inner caption text
              return (
                item.el.attr("data-title") ||
                item.el.find(".project-name").text() +
                  " — " +
                  item.el.find(".project-category").text()
              );
            },
          },
        });
      });
    </script>
    <script>
      function initNavPortal() {
        const item = document.getElementById("nav-contact");
        if (!item) return;

        const trigger = item.querySelector(".nav-trigger");
        let panel = item.querySelector(".nav-panel");
        const overlay = document.getElementById("nav-overlay");

        if (!trigger || !panel || !overlay) return;

        // --- 1) Move panel to <body> (portal)
        const ghost = document.createComment("nav-panel-portal-anchor"); // leave a marker
        item.replaceChild(ghost, panel);
        document.body.appendChild(panel);

        // --- 2) Positioning under the trigger
        function placePanel() {
          const r = trigger.getBoundingClientRect();
          const top = Math.round(r.bottom + 12); // 12px below trigger
          const left = Math.round(r.left + r.width / 2); // centered
          panel.style.top = `${top}px`;
          panel.style.left = `${left}px`;
          panel.style.transform = "translateX(-50%) translateY(8px) scale(.98)";
        }

        // --- 3) Open/close
        function open() {
          placePanel();
          overlay.classList.add("show");
          panel.classList.add("show", "animate-in");
          panel.addEventListener(
            "animationend",
            () => {
              panel.classList.remove("animate-in");
            },
            { once: true }
          );
        }
        function close() {
          overlay.classList.remove("show");
          panel.classList.remove("show");
        }

        // Hover open/close (desktop)
        trigger.addEventListener("mouseenter", open);
        trigger.addEventListener("mouseleave", (e) => {
          // give a tiny grace to reach the panel
          setTimeout(() => {
            if (!panel.matches(":hover") && !trigger.matches(":hover")) close();
          }, 80);
        });
        panel.addEventListener("mouseleave", () => {
          setTimeout(() => {
            if (!panel.matches(":hover") && !trigger.matches(":hover")) close();
          }, 80);
        });
        panel.addEventListener("mouseenter", placePanel); // keep it aligned if fonts shift

        // Click/tap toggle (mobile)
        trigger.addEventListener("click", (e) => {
          e.preventDefault();
          panel.classList.contains("show") ? close() : open();
        });

        // Keep position on scroll/resize while open
        window.addEventListener("resize", () => {
          if (panel.classList.contains("show")) placePanel();
        });
        window.addEventListener("scroll", () => {
          if (panel.classList.contains("show")) placePanel();
        });

        // Esc or overlay click closes
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") close();
        });
        overlay.addEventListener("click", close);
      }
    </script>
    <script>
      function initHeroContactPortal() {
        const trigger = document.querySelector(".hero-contact-trigger");
        const panel = document.querySelector(".hero-contact-panel");
        const overlay = document.getElementById("nav-overlay");
        if (!trigger || !panel || !overlay) return;

        // Portal to <body>
        document.body.appendChild(panel);

        // Harden stacking at runtime (in case other CSS fights it)
        panel.style.position = "fixed";
        panel.style.zIndex = "10002";
        overlay.style.zIndex = "10000";

        function placePanel() {
          const r = trigger.getBoundingClientRect();
          const top = Math.round(r.bottom + 12);
          const left = Math.round(r.left + r.width / 2);
          panel.style.top = `${top}px`;
          panel.style.left = `${left}px`;
          panel.style.transform = "translateX(-50%) translateY(8px) scale(.98)";
        }

        function open() {
          placePanel();
          overlay.classList.add("show");
          panel.classList.add("show", "animate-in");
          panel.addEventListener(
            "animationend",
            () => panel.classList.remove("animate-in"),
            { once: true }
          );
        }
        function close() {
          overlay.classList.remove("show");
          panel.classList.remove("show");
        }

        trigger.addEventListener("mouseenter", open);
        trigger.addEventListener("mouseleave", () =>
          setTimeout(() => {
            if (!panel.matches(":hover") && !trigger.matches(":hover")) close();
          }, 80)
        );
        panel.addEventListener("mouseleave", () =>
          setTimeout(() => {
            if (!panel.matches(":hover") && !trigger.matches(":hover")) close();
          }, 80)
        );
        trigger.addEventListener("click", (e) => {
          e.preventDefault();
          panel.classList.contains("show") ? close() : open();
        });

        window.addEventListener("resize", () => {
          if (panel.classList.contains("show")) placePanel();
        });
        window.addEventListener("scroll", () => {
          if (panel.classList.contains("show")) placePanel();
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") close();
        });
        overlay.addEventListener("click", close);
      }
    </script>

    <script>
      $.ajaxSetup({ cache: false });
      $(function () {
        $("#hero-placeholder").load("hero.html", function () {
          initHeroContactPortal();
        });

        $("#nav-placeholder").load("nav.html", function () {
          initNavPortal(); // your existing nav init
        });

        $("#about").load("about.html");
        $("#projects").load("projects.html", function () {
          var swiperOpts = {
            loop: true,
            spaceBetween: 10,
            slidesPerView: 1,
            navigation: { nextEl: ".triforge-next", prevEl: ".triforge-prev" },
            pagination: { el: ".triforge-pagination", clickable: true },
          };
          new Swiper(".triforge-swiper", swiperOpts);
          new Swiper(".andromedia-swiper", {
            loop: true,
            spaceBetween: 10,
            slidesPerView: 1,
            navigation: { nextEl: ".andromedia-next", prevEl: ".andromedia-prev" },
            pagination: { el: ".andromedia-pagination", clickable: true },
          });
          if (window.renderMermaid) window.renderMermaid();
        });
        $("#technologies").load("technologies.html");
        $("#portfolio").load("portfolio.html");
        $("#contact").load("contact.html");
      });
    </script>
  </body>
</html>
